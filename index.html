<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UML Use Case to Draw.io Generator</title>
    <style>
        :root {
            --bg-app: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --danger: #ef4444;
            --border: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        header {
            grid-column: 1 / -1;
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .row-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .form-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        .flex-1 { flex: 1; }
        .w-32 { width: 8rem; }

        button.btn-change {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem;
            font-size: 1.1rem;
            line-height: 1;
            border-radius: 4px;
        }

        button.btn-change:hover {
            color: var(--danger);
            background: rgba(68, 68, 239, 0.1);
        }

        .sidebar-sticky {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        button.btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button.btn-primary:hover { background: var(--accent-hover); }
        button.btn-primary:active { transform: scale(0.98); }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .summary-item:last-child { border-bottom: none; }
        .summary-item span.count { color: var(--text-main); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>UML Use Case Generator</h1>
        <p class="subtitle">Design structural logic seamlessly and export directly into clean Draw.io formats.</p>
    </header>

    <main>
        <div class="card">
          <div class="card-title">System</div>
          <div class="row-group">
            <input type="text" id="system-name" class="flex-1 system-name" placeholder="My System">

          </div>
        </div>
        <!-- ACTORS CARD -->
        <div class="card">
            <div class="card-title">Actors</div>
            <div id="actors-container" class="row-group"></div>
        </div>

        <!-- USE CASES CARD -->
        <div class="card">
            <div class="card-title">Use Cases</div>
            <div id="usecases-container" class="row-group"></div>
        </div>

        <!-- CONNECTIONS CARD -->
        <div class="card">
            <div class="card-title">Connections (Actor to Use Case)</div>
            <div id="connections-container" class="row-group"></div>
        </div>
    </main>

    <aside class="sidebar-sticky">
        <div class="card">
            <div class="card-title">Diagram Actions</div>
            <div style="margin-bottom: 1.5rem;">
                <div class="summary-item">Total Actors <span class="count" id="count-actors">0</span></div>
                <div class="summary-item">Total Use Cases <span class="count" id="count-usecases">0</span></div>
                <div class="summary-item">Active Connections <span class="count" id="count-connections">0</span></div>
            </div>
            <button class="btn-primary" onclick="exportToDrawio()">Generate & Download</button>
        </div>
    </aside>
</div>

<script>
    // System Data Stores
    let system = "";
    let actors = [{id: 'act_0', name: 'User', type: 'primary', inherits: ''}];
    let useCases = [{id: 'uc_0', name: 'Login to Account'}];
    let connections = [{id: 'conn_0', actorId: 'act_0', useCaseId: 'uc_0'}];
    
    let idCounter = 1;

    function init() {
        renderActors();
        renderUseCases();
        renderConnections();
        updateSummary();
    }
    document.getElementById('system-name').addEventListener('change', (e) => {
                system = e.target.value;
            });

    // Dynamic dropdown list synchronization
    function updateDropdowns() {
        const validActors = actors.filter(a => a.name.trim() !== '');
        const validUCs = useCases.filter(u => u.name.trim() !== '');

        // Sync actor inheritance items
        document.querySelectorAll('.inherits-select').forEach(select => {
            const currentVal = select.value;
            const rowId = select.dataset.id;
            select.innerHTML = '<option value="">No Inheritance</option>';
            validActors.forEach(act => {
                if(act.id !== rowId) {
                    select.innerHTML += `<option value="${act.id}">${act.name}</option>`;
                }
            });
            select.value = currentVal;
        });

        // Sync connection source elements
        document.querySelectorAll('.conn-actor-select').forEach(select => {
            const currentVal = select.value;
            select.innerHTML = '<option value="">Select Actor</option>';
            validActors.forEach(act => {
                select.innerHTML += `<option value="${act.id}">${act.name}</option>`;
            });
            select.value = currentVal;
        });

        // Sync connection target elements
        document.querySelectorAll('.conn-uc-select').forEach(select => {
            const currentVal = select.value;
            select.innerHTML = '<option value="">Select Use Case</option>';
            validUCs.forEach(uc => {
                select.innerHTML += `<option value="${uc.id}">${uc.name}</option>`;
            });
            select.value = currentVal;
        });
    }

    function updateSummary() {
        document.getElementById('count-actors').innerText = actors.filter(a => a.name.trim()).length;
        document.getElementById('count-usecases').innerText = useCases.filter(u => u.name.trim()).length;
        document.getElementById('count-connections').innerText = connections.filter(c => c.actorId && c.useCaseId).length;
    }

    // --- RENDER ENGINES ---
    function renderActors() {
        const container = document.getElementById('actors-container');
        container.innerHTML = '';
        actors.forEach((actor, index) => {
            const row = document.createElement('div');
            row.className = 'form-row';
            row.innerHTML = `
                <input type="text" class="flex-1 actor-name" data-id="${actor.id}" value="${escapeXml(actor.name)}" placeholder="e.g. Customer">
                <select class="w-32 actor-type" data-id="${actor.id}">
                    <option value="primary" ${actor.type === 'primary' ? 'selected' : ''}>Primary</option>
                    <option value="secondary" ${actor.type === 'secondary' ? 'selected' : ''}>Secondary</option>
                </select>
                <select class="flex-1 inherits-select" data-id="${actor.id}" data-val="${actor.inherits}"></select>
                <button class="btn-change" onclick="deleteRow('actor', '${actor.id}')">✕</button>
                <button class="btn-change" onclick="addRow('actor')">+</button>
            `;
            container.appendChild(row);
            
            // Attach input row auto-generation listeners
            row.querySelector('.actor-name').addEventListener('input', (e) => {
                actor.name = e.target.value;
               
                updateDropdowns();
                updateSummary();
            });

            row.querySelector('.actor-type').addEventListener('change', (e) => {
                actor.type = e.target.value;
            });

            row.querySelector('.inherits-select').addEventListener('change', (e) => {
                actor.inherits = e.target.value;
            });
        });
        updateDropdowns();
    }

    function renderUseCases() {
        const container = document.getElementById('usecases-container');
        container.innerHTML = '';
        useCases.forEach((uc, index) => {
            const row = document.createElement('div');
            row.className = 'form-row';
            row.innerHTML = `
                <input type="text" class="flex-1 uc-name" data-id="${uc.id}" value="${escapeXml(uc.name)}" placeholder="e.g. Process Payment">
                <button class="btn-change" onclick="deleteRow('uc', '${uc.id}')">✕</button>
                <button class="btn-change" onclick="addRow('uc')">+</button>
            `;
            container.appendChild(row);

            row.querySelector('.uc-name').addEventListener('input', (e) => {
                uc.name = e.target.value;
                
                updateDropdowns();
                updateSummary();
            });
        });
        updateDropdowns();
    }

    function renderConnections() {
    const container = document.getElementById('connections-container');
    if (!container) return;
    container.innerHTML = '';

    // 1. Pre-generate option strings so they exist in the DOM before we set .value
    const actorOptionsHtml = `<option value="">-- Select Actor --</option>` + 
        actors.filter(a => a.name.trim() !== '').map(a => `<option value="${a.id}">${escapeXml(a.name)}</option>`).join('');
    
    const ucOptionsHtml = `<option value="">-- Select Use Case --</option>` + 
        useCases.filter(u => u.name.trim() !== '').map(u => `<option value="${u.id}">${escapeXml(u.name)}</option>`).join('');

    connections.forEach((conn, index) => {
        const row = document.createElement('div');
        row.className = 'form-row';
        row.innerHTML = `
            <select class="flex-1 conn-actor-select" data-id="${conn.id}">
                ${actorOptionsHtml}
            </select>
            <span style="color: var(--text-muted); font-size: 0.85rem;">connects to</span>
            <select class="flex-1 conn-uc-select" data-id="${conn.id}">
                ${ucOptionsHtml}
            </select>
            <button class="btn-change" onclick="deleteRow('conn', '${conn.id}')">✕</button>
            <button class="btn-change" onclick="addRow('conn')">+</button>
        `;
        container.appendChild(row);

        const actorSel = row.querySelector('.conn-actor-select');
        const ucSel = row.querySelector('.conn-uc-select');

        // 2. Safely apply values now that the options actually exist
        actorSel.value = conn.actorId || '';
        ucSel.value = conn.useCaseId || '';

        // 3. Consolidated event listeners to prevent duplicate triggers
        actorSel.addEventListener('change', (e) => {
            conn.actorId = e.target.value;
            updateSummary();
            if (typeof changeHandler === 'function') changeHandler(e);
        });

        ucSel.addEventListener('change', (e) => {
            conn.useCaseId = e.target.value;
            updateSummary();
            if (typeof changeHandler === 'function') changeHandler(e);
        });
    });

    // Run fallback updates if your layout depends on it globally
    if (typeof updateDropdowns === 'function') updateDropdowns();
}    function deleteRow(type, id) {
        if (type === 'actor') {
            if (actors.length > 1) {
                actors = actors.filter(a => a.id !== id);
                connections = connections.filter(c => c.actorId !== id);
                actors.forEach(a => { if(a.inherits === id) a.inherits = ''; });
                renderActors();
                renderConnections();
            }
        } else if (type === 'uc') {
            if (useCases.length > 1) {
                useCases = useCases.filter(u => u.id !== id);
                connections = connections.filter(c => c.useCaseId !== id);
                renderUseCases();
                renderConnections();
            }
        } else if (type === 'conn') {
            if (connections.length > 1) {
                connections = connections.filter(c => c.id !== id);
                renderConnections();
            }
        }
        updateSummary();
    }

    function addRow(type) {
        if (type === 'actor') {
              actors.push({id: 'act_' + idCounter++, name: '', type: 'primary', inherits: ''});
              renderActors();
              renderConnections();
        } else if (type === 'uc') {
           
              useCases.push({id: 'uc_' + idCounter++, name: ''});
              renderUseCases();
        } else if (type === 'conn') {
              connections.push({id: 'conn_' + idCounter++, actorId: '', useCaseId: ''});
              renderConnections();
        }
        updateSummary();
    }
    // --- DRAW.IO CORE XML GENERATION ENGINE ---
   function exportToDrawio() {
    const validActors = actors.filter(a => a.name.trim() !== '');
    const validUCs = useCases.filter(u => u.name.trim() !== '');
    const validConns = connections.filter(c => c.actorId && c.useCaseId);
  
    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
    xml += `<mxfile host="app.diagrams.net">\n`;
    xml += `  <diagram name="Page-1" id="XwSXomkLUSkmTKb47o0F">\n`;
    xml += `    <mxGraphModel dx="2021" dy="1549" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="850" pageHeight="1100" math="0" shadow="0">\n`;
    xml += `      <root>\n`;
    xml += `        <mxCell id="0" />\n`;
    xml += `        <mxCell id="1" parent="0" />\n`;

    // 1. System Boundary Box (Dynamic Height Calculation)
    const systemHeight = 20 + (validUCs.length * 60);
    xml += `        <mxCell id="LJ0lisYWUPYzpD8U1sXA-1" parent="1" style="html=1;whiteSpace=wrap;align=center;labelPosition=center;verticalLabelPosition=top;verticalAlign=bottom;fillColor=#dae8fc;strokeColor=#6c8ebf;" value="${escapeXml(system)}" vertex="1">\n`;
    xml += `          <mxGeometry height="${systemHeight}" width="150" x="-400" y="120" as="geometry" />\n`;
    xml += `        </mxCell>\n`;

    let primaryCount = 0;
    let secondaryCount = 0;
    const actorPositions = {};

    // 2. Structural Mapping: Process Actors
    validActors.forEach(actor => {
        let x = -560;
        let y = 140;

        // Check if this actor acts as a base class/parent for others
        const isBaseActor = validActors.some(a => a.inherits === actor.id);
        
        if (actor.type === 'primary') {
            if (isBaseActor) {
                // Pin the shared base actor to the outermost left track column
                x = -640;
                y = 140;
            } else {
                // Stack specific primary actors below it
                y = 220 + (primaryCount * 130);
                primaryCount++;
            }
        } else {
            // Right-aligned column track for secondary actors / APIs
            x = -120;
            y = 340 + (secondaryCount * 190);
            secondaryCount++;
        }

        actorPositions[actor.id] = { x: x, y: y, type: actor.type };

        let actorStyle = `shape=umlActor;verticalLabelPosition=bottom;verticalAlign=top;html=1;`;
        if (isBaseActor) {
            actorStyle = `shape=umlActor;verticalLabelPosition=middle;verticalAlign=middle;html=1;labelPosition=left;align=right;`;
        }

        xml += `        <mxCell id="${actor.id}" value="${escapeXml(actor.name)}" style="${actorStyle}" vertex="1" parent="1">\n`;
        xml += `          <mxGeometry x="${x}" y="${y}" width="30" height="60" as="geometry" />\n`;
        xml += `        </mxCell>\n`;
    });

    // 3. Structural Mapping: Process Vertical Center-aligned Use Cases
    validUCs.forEach((uc, index) => {
        const x = -395; 
        const y = 130 + (index * 60); 

        xml += `        <mxCell id="${uc.id}" value="${escapeXml(uc.name)}" style="ellipse;whiteSpace=wrap;html=1;" vertex="1" parent="1">\n`;
        xml += `          <mxGeometry x="${x}" y="${y}" width="140" height="50" as="geometry" />\n`;
        xml += `        </mxCell>\n`;
    });

    // 4. Connection Mapping: Relationship Edges
    validConns.forEach((conn, index) => {
        const actorPos = actorPositions[conn.actorId];
        let entryX = "0";

        // Route nicely into the right side of the ellipse if the actor sits on the right
        if (actorPos && actorPos.type !== 'primary') {
            entryX = "1";
        }

        let edgeStyle = `edgeStyle=entityRelationEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;html=1;entryX=${entryX};entryY=0.5;entryDx=0;entryDy=0;`;

        xml += `        <mxCell id="edge_${index}" style="${edgeStyle}" source="${conn.actorId}" target="${conn.useCaseId}" edge="1" parent="1">\n`;
        xml += `          <mxGeometry relative="1" as="geometry" />\n`;
        xml += `        </mxCell>\n`;
    });

    // 5. Inheritance Structural Links
    validActors.forEach((actor, index) => {
        if (actor.inherits && actorPositions[actor.inherits]) {
            const sourcePos = actorPositions[actor.id];
            const targetPos = actorPositions[actor.inherits];
            
            // Mathematically compute the orthogonal inflection point
            const midX = targetPos.x + 15;
            const midY = sourcePos.y + 30;

            const inheritStyle = `endArrow=block;endSize=16;endFill=0;html=1;rounded=0;exitX=0.5;exitY=0.5;exitDx=0;exitDy=0;exitPerimeter=0;`;
            
            xml += `        <mxCell id="inherits_${index}" style="${inheritStyle}" source="${actor.id}" target="${actor.inherits}" edge="1" parent="1">\n`;
            xml += `          <mxGeometry relative="1" width="160" as="geometry">\n\n`;
            xml += `            <Array as="points">\n`;
            xml += `              <mxPoint x="${midX}" y="${midY}" />\n`;
            xml += `            </Array>\n`;
            xml += `          </mxGeometry>\n`;
            xml += `        </mxCell>\n`;
        }
    });

    xml += `      </root>\n`;
    xml += `    </mxGraphModel>\n`;
    xml += `  </diagram>\n`;
    xml += `</mxfile>\n`;

    // Execution of File Delivery Engine
    const blob = new Blob([xml], { type: 'text/xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'use-case-diagram.drawio';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function escapeXml(str) {
    if (!str) return '';
    return str.replace(/[<>&'"]/g, (c) => {
        switch (c) {
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '&': return '&amp;';
            case '\'': return '&apos;';
            case '"': return '&quot;';
        }
    });
}
    // Launch Application instance
    window.onload = init;
</script>
</body>
</html>
